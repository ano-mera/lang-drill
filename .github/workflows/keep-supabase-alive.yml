name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */4 * *' # Every 4 days
  workflow_dispatch: # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --retry 3 --retry-delay 10 \
            'https://ggwuevlehtjrugkydwab.supabase.co/auth/v1/health')
          echo "Supabase responded with HTTP $STATUS"
