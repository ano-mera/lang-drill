name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # Every 3 days
  workflow_dispatch: # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase database
        env:
          SUPABASE_URL: https://ggwuevlehtjrugkydwab.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_0wK9FneKZYtKRAlFV3_xFg_KSKOHSi-
        run: |
          STATUS=$(curl -s -o /tmp/response.txt -w '%{http_code}' --retry 3 --retry-delay 10 \
            "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "HTTP $STATUS"
          cat /tmp/response.txt
          if [ "$STATUS" -ge 500 ] || [ "$STATUS" -eq 000 ]; then
            exit 1
          fi
